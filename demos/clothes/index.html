<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atelier &mdash; Spring Collection</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      color: #2a2a2a;
      background: #fafafa;
      line-height: 1.5;
    }
    .site-header {
      background: #1f1f1f;
      color: #fff;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-title {
      margin: 0;
      font-weight: 300;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
    }
    .site-nav a {
      color: #cccccc;
      text-decoration: none;
      margin-left: 2rem;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }
    .hero {
      position: relative;
    }
    .hero img {
      width: 100%;
      height: auto;
      display: block;
    }
    .hero h2 {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      color: #ffffff;
      font-weight: 300;
      font-size: 2.5rem;
      letter-spacing: 0.05em;
      margin: 0;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .product-grid {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    .product-card {
      flex: 1 1 220px;
      max-width: 260px;
      margin: 0 1rem 2.5rem;
    }
    .product-card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .product-card h3 {
      font-weight: 400;
      font-size: 1rem;
      margin: 1rem 0 0.25rem;
      letter-spacing: 0.03em;
    }
    .product-card p {
      color: #888888;
      margin: 0;
      font-size: 0.95rem;
    }
    .site-footer {
      text-align: center;
      padding: 2rem;
      color: #888888;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">ATELIER</h1>
    <nav class="site-nav">
      <a href="#shop">Shop</a>
      <a href="#lookbook">Lookbook</a>
      <a href="#stores">Stores</a>
    </nav>
  </header>

  <section class="hero">
    <img src="https://via.placeholder.com/1400x500/e2dccd/2a2a2a?text=Spring+Collection+2015"
         alt="Spring Collection 2015">
    <h2>Spring Collection</h2>
  </section>

  <section class="product-grid">
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/c9b87a/333333?text=Wool+Coat" alt="Wool Coat">
      <h3>Wool Coat</h3>
      <p>&euro;289</p>
    </article>
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/dbd3c3/333333?text=Silk+Blouse"
           alt="Silk Blouse">
      <h3>Silk Blouse</h3>
      <p>&euro;129</p>
    </article>
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/9aa9b0/ffffff?text=Linen+Trousers"
           alt="Linen Trousers">
      <h3>Linen Trousers</h3>
      <p>&euro;159</p>
    </article>
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/3a3a3a/eeeeee?text=Leather+Boots"
           alt="Leather Boots">
      <h3>Leather Boots</h3>
      <p>&euro;229</p>
    </article>
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/cb8f70/ffffff?text=Knit+Cardigan"
           alt="Knit Cardigan">
      <h3>Knit Cardigan</h3>
      <p>&euro;189</p>
    </article>
    <article class="product-card">
      <img src="https://via.placeholder.com/520x650/7e6c5c/ffffff?text=Canvas+Tote"
           alt="Canvas Tote">
      <h3>Canvas Tote</h3>
      <p>&euro;89</p>
    </article>
  </section>

  <footer class="site-footer">&copy; 2015 Atelier</footer>

  <script src="../../runtime.js"></script>
</body>
</html>
