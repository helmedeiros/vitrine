<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vitrine &mdash; Admin</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      background: #f7f7f4;
      color: #2a2a2a;
      line-height: 1.5;
    }
    header {
      background: #1f1f1f;
      color: #ffffff;
      padding: 1.25rem 1.5rem;
    }
    header h1 {
      margin: 0;
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
    }
    .layout {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .empty-state {
      padding: 2rem;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 4px;
      text-align: center;
      color: #666;
    }
    .empty-state code {
      background: #f0f0f0;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-size: 0.92em;
    }
    #vitrine-error {
      display: none;
      padding: 1rem 1.25rem;
      background: #fff0ef;
      border: 1px solid #c84a44;
      border-radius: 3px;
      color: #8a2820;
      margin-bottom: 1.5rem;
    }
    h2.section-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin: 2rem 0 1rem;
    }
    #vitrine-image-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
    }
    .vitrine-image-card {
      flex: 0 0 200px;
      margin: 0 1rem 1rem 0;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 3px;
      padding: 0.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .vitrine-image-card:hover { border-color: #b0b0b0; }
    .vitrine-card-selected {
      border-color: #e95950;
      box-shadow: 0 0 0 2px rgba(233, 89, 80, 0.25);
    }
    .vitrine-image-thumb {
      width: 100%;
      max-height: 160px;
      display: block;
      margin: 0 auto;
      object-fit: cover;
    }
    .vitrine-image-url {
      display: block;
      margin-top: 0.5rem;
      font-family: Menlo, Consolas, monospace;
      font-size: 0.72rem;
      color: #666666;
      word-break: break-all;
      line-height: 1.35;
    }
    #vitrine-editor {
      margin-top: 1rem;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 3px;
      padding: 1rem;
      min-height: 80px;
    }
    .vitrine-editor-image-wrapper { display: inline-block; }
    .vitrine-editor-image { max-width: 100%; }
    .vitrine-editor-empty {
      color: #888888;
      font-style: italic;
      text-align: center;
      padding: 1rem 1.25rem;
    }
    #vitrine-region-list { margin-top: 1rem; }
    .vitrine-region-row {
      display: flex;
      align-items: center;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      border-radius: 3px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.4rem;
    }
    .vitrine-region-label {
      font-family: Menlo, Consolas, monospace;
      font-size: 0.78rem;
      color: #555;
      flex: 0 0 110px;
    }
    .vitrine-region-url-input {
      flex: 1;
      border: 1px solid #d4d4d4;
      border-radius: 3px;
      padding: 0.35rem 0.55rem;
      font-size: 0.92rem;
      margin: 0 0.5rem;
    }
    .vitrine-region-remove {
      background: #ffffff;
      color: #c84a44;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .vitrine-region-remove:hover { background: #fde8e7; border-color: #c84a44; }
    .vitrine-region-row--invalid { border-color: #c84a44; background: #fff8f7; }
    .vitrine-region-row--invalid .vitrine-region-url-input {
      border-color: #c84a44;
    }
    .vitrine-regions-empty {
      padding: 1rem 1.25rem;
      background: #ffffff;
      border: 1px dashed #d4d4d4;
      border-radius: 3px;
      color: #888888;
      font-style: italic;
      text-align: center;
    }
    .vitrine-regions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2rem 0 1rem;
    }
    .vitrine-regions-header .section-title { margin: 0; }
    #vitrine-clear-regions {
      background: #ffffff;
      color: #555;
      border: 1px solid #d4d4d4;
      border-radius: 3px;
      padding: 0.35rem 0.8rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #vitrine-clear-regions:hover {
      background: #f0f0f0;
      color: #c84a44;
      border-color: #c84a44;
    }
    #vitrine-export-button,
    #vitrine-copy-button {
      background: #1f1f1f;
      color: #ffffff;
      border: 0;
      border-radius: 3px;
      padding: 0.6rem 1.1rem;
      cursor: pointer;
      font-size: 0.92rem;
      letter-spacing: 0.04em;
    }
    #vitrine-copy-button {
      background: #ffffff;
      color: #1f1f1f;
      border: 1px solid #1f1f1f;
      margin-left: 0.5rem;
    }
    #vitrine-export-button:hover { background: #2a2a2a; }
    #vitrine-copy-button:hover { background: #f0f0f0; }
    #vitrine-export-output {
      display: block;
      width: 100%;
      min-height: 120px;
      margin-top: 0.75rem;
      font-family: Menlo, Consolas, monospace;
      font-size: 0.78rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d4d4d4;
      border-radius: 3px;
      box-sizing: border-box;
      resize: vertical;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vitrine &mdash; Admin</h1>
  </header>

  <main class="layout">
    <div id="vitrine-error" role="alert"></div>

    <div class="empty-state">
      Load this page with <code>#data=&lt;base64&gt;</code> in the URL to import
      images. Open any demo from the
      <a href="../">vitrine home page</a> and click <strong>Open in Vitrine</strong>.
    </div>

    <h2 class="section-title">Detected images</h2>
    <ul id="vitrine-image-list"></ul>

    <h2 class="section-title">Editor</h2>
    <div id="vitrine-editor"></div>

    <div class="vitrine-regions-header">
      <h2 class="section-title">Regions</h2>
      <button id="vitrine-clear-regions" type="button">Clear all</button>
    </div>
    <div id="vitrine-region-list"></div>

    <h2 class="section-title">Export snippet</h2>
    <button id="vitrine-export-button" type="button">Generate snippet</button>
    <button id="vitrine-copy-button" type="button">Copy</button>
    <textarea id="vitrine-export-output" readonly
      placeholder="Click Generate snippet to produce a script tag you can paste into the host page."></textarea>
  </main>

  <script src="admin.js"></script>
</body>
</html>
